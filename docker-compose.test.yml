# Throwaway Postgres for `npm test --workspace @plainspace/server`.
# Lives on a separate compose project name and host port from docker-compose.yml
# so a running dev stack doesn't collide. Data lives in a tmpfs volume —
# anything written here is gone the moment the container stops.
#
# Port 5434 is used (not 5432) so a developer running Postgres natively on the
# host's default port can keep doing so without stopping it first.
#
# TEST-ONLY credentials — bound to loopback, tmpfs-backed, never copy these
# into a network-exposed deployment.
#
# Run with:
#   docker compose -f docker-compose.test.yml up -d
#   npm test
#   docker compose -f docker-compose.test.yml down

name: plainspace-test

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spaces
      POSTGRES_PASSWORD: spaces
      POSTGRES_DB: spaces_test
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - '127.0.0.1:5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spaces -d spaces_test']
      interval: 2s
      timeout: 2s
      retries: 10
