# DORMANT — attachments are disabled (see project CLAUDE.md): the server no
# longer reads any S3_* env var and the attachment e2e spec is testIgnore'd,
# so nothing currently uses this compose file. It is kept as the MinIO
# sidecar for when attachments are re-enabled: an init container creates the
# attachments bucket on startup, the server reads S3_ENDPOINT from .env
# (point it at http://localhost:9000 for local e2e). Run with:
#   docker compose -f docker-compose.e2e.yml up -d
# Then `cd packages/e2e && npm test` exercises the real upload/get/delete
# flow against MinIO with the same S3 SDK code used in production.

name: plainspace-e2e

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/plainspace-attachments-dev
        # Permissive bucket policy is fine for e2e (no real data, on a
        # loopback port). Production R2 buckets must be private.
        mc anonymous set download local/plainspace-attachments-dev
        echo "MinIO bucket ready"
    restart: 'no'
